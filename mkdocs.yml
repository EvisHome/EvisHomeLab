site_name: EvisHomeLab

# 1. THEME SETTINGS (Must be indented exactly like this)
theme:
  name: material
  palette: 
    # Dark Mode (Default)
    - scheme: slate
      primary: blue-grey
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Light Mode (Fallback)
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  # 2. FEATURES (This turns on the Top Navigation Tabs)
  features:
    - navigation.tabs        # <-- This enables the top menu
    - navigation.top         # <-- This adds the "Back to Top" arrow
    - navigation.sections    # <-- Keeps the sidebar clean
    - content.code.copy      # <-- Adds copy button to code blocks

# 3. CUSTOM CSS
extra_css:
  - stylesheets/extra.css

# 4. NAVIGATION STRUCTURE
nav:
  - Home: index.md
  - Inventory: network_inventory.md
  - Topology: network_topology.md

# 5. MARKDOWN EXTENSIONS (For Mermaid Diagrams)
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# 6. PLUGINS (For the Inventory Database)
plugins:
  - search
  - macros:
      include_yaml:
        - data/inventory.yaml
