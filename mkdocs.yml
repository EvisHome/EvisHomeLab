site_name: EvisHomeLab
theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
plugins:
  - search
  - macros:
      include_yaml:
        - data/inventory.yaml
